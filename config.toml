[runtime]
log_level = "INFO"
enable_collector = true
enable_audio_capturer = false
enable_screen_capturer = false
enable_processor = false

[capturer.audio]
spool_dir = "tmp/audio"
request_timeout_s = 30.0
max_upload_per_cycle = 5
min_rms = 0
reconnect_delay_s = 5.0
sample_rate = 8000
target_sample_rate = 8000
frame_ms = 20
vad_mode = 2
start_rms = 150
continue_rms = 100
start_trigger_ms = 120
start_window_ms = 400
end_silence_ms = 700
pre_roll_ms = 300
min_segment_ms = 500
max_segment_ms = 30000
input_device = ""
latency = ""
gain_db = 0.0
diagnostic_s = 0.0
low_speech_ratio = 0.2
low_speech_max_ms = 1600

[capturer.screen]
tmp_dir = "tmp/screen"
fps = 0.5
request_timeout_s = 30.0
prompt_permission = false
dedup_window_s = 300.0
dedup_threshold = 5

[collector]
host = "127.0.0.1"
port = 8000
audio_url = "http://127.0.0.1:8000/api/audio"
screen_url = "http://127.0.0.1:8000/api/screen"
tmp_dir = "tmp/collector"
vault_dir = "vault"

[services.audio]
url = "http://127.0.0.1:9092/v1/audio/transcriptions"
method = "POST"
timeout = 30
format = "default"
headers = {}
body = {}

[services.screen]
url = "http://127.0.0.1:9093/ocr"
method = "POST"
timeout = 30
format = "default"
headers = {}
body = {}

[services.processor]
url = "http://127.0.0.1:9100/v1/chat/completions"
headers = {}
body = {}


[processor]
vault_dir = "vault"
out_dir = "out"
state_dir = "state"
poll_interval_seconds = 10.0
execution_mode = "per_stage_worker"
max_concurrent_tasks = 1
dry_run = false

[[processor.stages]]
name = "l1"
enabled = true
type = "llm_map"
input = { base_dir = "vault", path = ".", format = "json" }
state_key = "l1"
prompt = """You transform raw capturer records into normalized event objects.

Return valid JSON only.

Input:
- `events`: array of raw capturer records

Output:
- Return exactly one normalized object per input item under `events`

For each output object, include:
- `event_id`
- `timestamp`
- `title`
- `description`
- `content`
- `meta`
- optionally `source_type`, `app_name`, `context`

Requirements:
- Preserve the original event ordering.
- Keep `timestamp` aligned with the source event unless correction is clearly justified by the input.
- `title` must be short and specific.
- `description` must be one concise summary sentence.
- `content` should contain the most useful cleaned textual content from the raw event.
- `meta` should remain a structured object.
- Do not invent facts that are not supported by the input.
- If the input is noisy or sparse, still return the best faithful normalized event.

Return shape:
{
  "events": [
    {
      "event_id": "string",
      "timestamp": "ISO-8601 string",
      "title": "string",
      "description": "string",
      "content": "string",
      "meta": {},
      "source_type": "string",
      "app_name": "string",
      "context": {}
    }
  ]
}"""
batch_size = 1
flush_threshold = 1
flush_when_upstream_empty = true
upstream = []
archive = { base_dir = "out", path = "l0_processed_raw", format = "json" }
transform_adapter = "llm_map"
concurrency = 1
transform_options = { input_mode = "raw", input_key = "events" }
outputs = [
  { name = "events", collection = { base_dir = "out", path = "l1", format = "json" }, projection = "none", result_key = "events", kind = "event", id_field = "event_id", date_field = "date", timestamp_field = "timestamp", source_id_field = "source_raw_event_id" },
]

[[processor.stages]]
name = "l2"
enabled = true
type = "llm_reduce"
input = { base_dir = "out", path = "l1", format = "json" }
state_key = "l2"
prompt = """You transform normalized events into a cleaned timeline and grouped super-events.

Return valid JSON only.

Input:
- `events`: array of normalized event objects

Output:
- `cleaned_timeline`: ordered timeline items
- `super_events`: grouped higher-level units spanning one or more events

Each timeline item should include:
- `timeline_event_id`
- `title`
- `description`
- `timestamp_start`
- `timestamp_end`
- `source_event_ids`
- optionally `super_event_id`

Each super event should include:
- `super_event_id`
- `title`
- `description`
- `timestamp_start`
- `timestamp_end`
- `source_event_ids`
- `timeline_event_ids`
- optionally `grouping_dimensions`, `category`, `subject`

Requirements:
- Keep the timeline chronologically ordered.
- Group events when they clearly belong to the same coherent activity, task, or session.
- Use precise, compact titles.
- `source_event_ids` must reference real input event ids.
- Avoid over-grouping unrelated events.
- If grouping is weak, prefer smaller and more faithful groups.
- Do not invent unsupported categories or subjects.

Return shape:
{
  "cleaned_timeline": [
    {
      "timeline_event_id": "string",
      "title": "string",
      "description": "string",
      "timestamp_start": "ISO-8601 string",
      "timestamp_end": "ISO-8601 string",
      "source_event_ids": ["event_id"],
      "super_event_id": "string"
    }
  ],
  "super_events": [
    {
      "super_event_id": "string",
      "title": "string",
      "description": "string",
      "timestamp_start": "ISO-8601 string",
      "timestamp_end": "ISO-8601 string",
      "source_event_ids": ["event_id"],
      "timeline_event_ids": ["timeline_event_id"],
      "grouping_dimensions": ["topic"],
      "category": "string",
      "subject": "string"
    }
  ]
}"""
batch_size = 5
flush_threshold = 5
flush_when_upstream_empty = true
archive = { base_dir = "out", path = "l1_processed", format = "json" }
upstream = [{ base_dir = "vault", path = ".", format = "json" }]
transform_adapter = "llm_reduce"
concurrency = 1
transform_options = { input_mode = "payload", input_key = "events" }
outputs = [
  { name = "timeline_events", collection = { base_dir = "out", path = "timeline_events", format = "json" }, projection = "jsonl_day", projection_target = { base_dir = "out", path = "timeline", format = "jsonl" }, result_key = "cleaned_timeline", kind = "timeline_event", id_field = "timeline_event_id", date_field = "date", timestamp_field = "timestamp_start", source_id_field = "source_event_ids" },
  { name = "super_events", collection = { base_dir = "out", path = "l2", format = "json" }, projection = "none", result_key = "super_events", kind = "super_event", id_field = "super_event_id", date_field = "date", timestamp_field = "timestamp_start", source_id_field = "source_event_ids" },
]

[[processor.stages]]
name = "l3"
enabled = true
type = "llm_reduce"
input = { base_dir = "out", path = "l2", format = "json" }
state_key = "l3"
prompt = """You transform super-events into inbox notes.

Return valid JSON only.

Input:
- `super_events`: array of grouped activity objects

Output:
- `notes`: exactly one note per input super-event

Each note should include:
- `note_id`
- `timestamp`
- `date`
- `title`
- `description`
- `content`
- `category`
- `subject`
- `super_event_id`
- `source_event_ids`

Requirements:
- Produce one note for each input super-event.
- `title` should read like a useful personal note title.
- `description` should be a short summary.
- `content` should be a fuller, still concise note body based only on the input.
- Preserve traceability fields exactly.
- Do not invent facts, plans, or conclusions unsupported by the source material.
- If the input is sparse, still emit a faithful minimal note.

Return shape:
{
  "notes": [
    {
      "note_id": "string",
      "timestamp": "ISO-8601 string",
      "date": "YYYY-MM-DD",
      "title": "string",
      "description": "string",
      "content": "string",
      "category": "string",
      "subject": "string",
      "super_event_id": "string",
      "source_event_ids": ["event_id"]
    }
  ]
}"""
batch_size = 15
flush_threshold = 15
flush_when_upstream_empty = true
upstream = [{ base_dir = "out", path = "l1", format = "json" }]
transform_adapter = "llm_reduce"
concurrency = 1
transform_options = { input_mode = "payload", input_key = "super_events" }
outputs = [
  { name = "notes", collection = { base_dir = "out", path = "notes", format = "json" }, projection = "none", result_key = "notes", kind = "inbox_note", id_field = "note_id", date_field = "date", timestamp_field = "timestamp", source_id_field = "source_event_ids" },
  { name = "note_docs", collection = { base_dir = "out", path = "notes/inbox", format = "markdown" }, projection = "markdown_note", result_key = "notes", kind = "inbox_note", id_field = "note_id", date_field = "date", timestamp_field = "timestamp", source_id_field = "source_event_ids" },
]
