[runtime]
log_level = "INFO"
enable_collector = true
enable_audio_capturer = false
enable_screen_capturer = false
enable_processor = false

[capturer.audio]
spool_dir = "tmp/audio"
request_timeout_s = 30.0
max_upload_per_cycle = 5
min_rms = 0
reconnect_delay_s = 5.0
sample_rate = 8000
target_sample_rate = 8000
frame_ms = 20
vad_mode = 2
start_rms = 150
continue_rms = 100
start_trigger_ms = 120
start_window_ms = 400
end_silence_ms = 700
pre_roll_ms = 300
min_segment_ms = 500
max_segment_ms = 30000
input_device = ""
latency = ""
gain_db = 0.0
diagnostic_s = 0.0
low_speech_ratio = 0.2
low_speech_max_ms = 1600

[capturer.screen]
tmp_dir = "tmp/screen"
fps = 0.5
request_timeout_s = 30.0
prompt_permission = false
dedup_window_s = 300.0
dedup_threshold = 5

[collector]
host = "127.0.0.1"
port = 8000
audio_url = "http://127.0.0.1:8000/api/audio"
screen_url = "http://127.0.0.1:8000/api/screen"
tmp_dir = "tmp/collector"
vault_dir = "vault"

[services.audio]
url = "http://127.0.0.1:9092/v1/audio/transcriptions"
method = "POST"
timeout = 30
format = "default"
headers = {}
body = {}

[services.screen]
url = "http://127.0.0.1:9093/ocr"
method = "POST"
timeout = 30
format = "default"
headers = {}
body = {}

[services.processor]
url = "http://127.0.0.1:9100/v1/chat/completions"
headers = {}
body = {}


[processor]
vault_dir = "vault"
out_dir = "out"
state_dir = "state"
poll_interval_seconds = 10.0
execution_mode = "per_stage_worker"
max_concurrent_tasks = 1
dry_run = false

[[processor.stages]]
name = "l1"
enabled = true
type = "llm_map"
input = { base_dir = "vault", path = ".", format = "json" }
state_key = "l1"
prompt = """You transform raw capturer records into normalized event objects.

Return valid JSON only.

Input:
- `events`: array of extracted text strings, one per raw capturer record

Output:
- Return exactly one normalized object per input item under `events`

For each output object, include:
- `title`
- `description`
- `content`

Requirements:
- Preserve the original event ordering.
- `title` must be short and specific.
- `description` must be one concise summary sentence.
- `content` should contain the most useful cleaned textual content from the input.
- Do not invent facts that are not supported by the input.
- If the input is noisy or sparse, still return the best faithful normalized event.

Return shape:
{
  "events": [
    {
      "title": "string",
      "description": "string",
      "content": "string"
    }
  ]
}"""
batch_size = 1
flush_threshold = 1
flush_when_upstream_empty = true
upstream = []
archive = { base_dir = "out", path = "l0_processed_raw", format = "json" }
transform_adapter = "llm_map"
concurrency = 1
transform_options = { input_mode = "raw", input_projection = "record_text", input_key = "events", output_map_source = "raw", output_map = { event_id = "input:id", timestamp = "input:timestamp", date = "date_from:input:timestamp", source_raw_event_id = "input:id", "metadata.raw" = "input" } }
outputs = [
  { name = "events", collection = { base_dir = "out", path = "l1", format = "json" }, projection = "none", result_key = "events", kind = "event", id_field = "event_id", date_field = "date", timestamp_field = "timestamp", source_id_field = "source_raw_event_id" },
]

[[processor.stages]]
name = "l2"
enabled = true
type = "llm_reduce"
input = { base_dir = "out", path = "l1", format = "json" }
state_key = "l2"
prompt = """You transform normalized events into a cleaned timeline and grouped super-events.

Return valid JSON only.

Input:
- `events`: array of cleaned event objects containing only `event_id`, `title`, and `description`

Output:
- `super_events`: grouped higher-level units spanning one or more related events

Each super event should include:
- `title`
- `description`
- `source_event_ids`

Requirements:
- Group events when they clearly belong to the same coherent activity, task, category, or session.
- Use precise, compact titles.
- `source_event_ids` must reference real input event ids.
- Avoid over-grouping unrelated events.
- If grouping is weak, prefer smaller and more faithful groups.
- Base the grouping only on the provided event ids, titles, and descriptions.
- Do not invent unsupported facts.

Return shape:
{
  "super_events": [
    {
      "title": "string",
      "description": "string",
      "source_event_ids": ["event_id"]
    }
  ]
}"""
batch_size = 5
flush_threshold = 5
flush_when_upstream_empty = true
archive = { base_dir = "out", path = "l1_processed", format = "json" }
upstream = [{ base_dir = "vault", path = ".", format = "json" }]
transform_adapter = "llm_reduce"
concurrency = 1
transform_options = { input_mode = "payload", input_projection = { event_id = "event_id", title = "title", description = "description" }, input_key = "events", output_map_source = "payload", output_map = { super_event_id = { op = "slug", from = "row", path = "title", prefix = "super_" }, timestamp_start = { op = "min_path_from_matches", ids_from_row = "source_event_ids", match_id_path = "event_id", value_path = "timestamp" }, timestamp_end = { op = "max_path_from_matches", ids_from_row = "source_event_ids", match_id_path = "event_id", value_path = "timestamp" }, date = { op = "date_from_path", from = "row", path = "timestamp_start" }, events = { op = "match_items", ids_from_row = "source_event_ids", match_id_path = "event_id", fields = { event_id = "event_id", title = "title", description = "description" } } } }
outputs = [
  { name = "super_events", collection = { base_dir = "out", path = "l2", format = "json" }, projection = "none", result_key = "super_events", kind = "super_event", id_field = "super_event_id", date_field = "date", timestamp_field = "timestamp_start", source_id_field = "source_event_ids" },
]

[[processor.stages]]
name = "l3"
enabled = true
type = "llm_reduce"
input = { base_dir = "out", path = "l2", format = "json" }
state_key = "l3"
prompt = """You transform super-events into inbox notes.

Return valid JSON only.

Input:
- `super_events`: array of grouped activity objects with the super-event `title`, `description`, and member `events` containing `title`, `description`, and `content`

Output:
- `notes`: exactly one note per input super-event

Each note should include:
- `title`
- `description`
- `content`
- `category`
- `subject`

Requirements:
- Produce one note for each input super-event.
- `title` should read like a useful personal note title.
- `description` should be a short summary.
- `content` should be a fuller, still concise note body based only on the input.
- `category` should be a note type.
- `subject` should capture the main theme or topic.
- Do not invent facts, plans, or conclusions unsupported by the source material.
- If the input is sparse, still emit a faithful minimal note.

Return shape:
{
  "notes": [
    {
      "title": "string",
      "description": "string",
      "content": "string",
      "category": "string",
      "subject": "string"
    }
  ]
}"""
batch_size = 1
flush_threshold = 1
flush_when_upstream_empty = true
upstream = [{ base_dir = "out", path = "l1", format = "json" }]
transform_adapter = "llm_reduce"
concurrency = 1
transform_options = { input_mode = "payload", input_projection = { title = "title", description = "description", events = "events" }, input_key = "super_events", output_map_source = "payload", output_map = { note_id = { op = "slug", from = "row", path = "title", prefix = "note_" }, timestamp = "input:timestamp_start", date = "input:date", super_event_id = "input:super_event_id" } }
outputs = [
  { name = "notes", collection = { base_dir = "out", path = "notes", format = "json" }, projection = "none", result_key = "notes", kind = "inbox_note", id_field = "note_id", date_field = "date", timestamp_field = "timestamp" },
  { name = "note_docs", collection = { base_dir = "out", path = "notes/inbox", format = "markdown" }, projection = "markdown_note", result_key = "notes", kind = "inbox_note", id_field = "note_id", date_field = "date", timestamp_field = "timestamp" },
]
